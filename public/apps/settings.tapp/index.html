<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings</title>
    <script src="/assets/libs/tailwind.min.js"></script>
    <link rel="stylesheet" href="./index.css" />
</head>
<body class="text-white antialiased">
    <main class="settings-shell mx-auto min-h-screen w-full max-w-screen-2xl px-4 py-8 sm:px-8 lg:px-12">
        <section id="homeScreen" class="screen home-screen flex flex-col gap-8">
            <header class="mx-auto flex flex-col items-center gap-1 text-center">
                <h1 class="settings-title text-4xl font-extrabold leading-tight sm:text-6xl">Settings</h1>
                <h2 class="settings-subtitle text-3xl font-bold text-white/60">Recently Visited</h2>
            </header>

            <section id="recentlyVisited" class="mx-auto grid w-full max-w-7xl grid-cols-2 gap-3 sm:grid-cols-4 lg:grid-cols-4" aria-label="Recently visited settings"></section>

            <section id="categoryGrid" class="mx-auto grid w-full max-w-7xl grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-5" aria-label="Settings categories"></section>
        </section>

        <section id="detailScreen" class="screen detail-screen hidden">
            <header class="detail-header mb-4 flex items-center justify-center">
                <h1 id="detailTitle" class="settings-title text-4xl font-extrabold leading-tight sm:text-6xl text-center">Category</h1>
            </header>

            <div class="detail-shell mx-auto w-full max-w-7xl">
                <aside id="detailSidebar" class="detail-sidebar" aria-label="Settings views"></aside>
                <section id="detailContent" class="detail-content" aria-label="Settings content"></section>
            </div>
        </section>
    </main>

    <script src="./index.js"></script>
</body>
</html>
